      border: 2px solid #fff;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    .tooltip {
      position: absolute;
      padding: 4px 8px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 12px;
      border-radius: 3px;
      pointer-events: none;
      transform: translate(-50%, -120%);

      display: none;
      z-index: 10;

    img.addEventListener("load", () => {
      const imgWidth = img.naturalWidth;
      const imgHeight = img.naturalHeight;

      markers.forEach(m => {
        const el = document.createElement("div");
        el.className = "marker";

        // Conversione in percentuale
        const leftPercent = (m.x / imgWidth) * 100;
        const topPercent = (m.y / imgHeight) * 100;

        el.style.left = leftPercent + "%";
        el.style.top = topPercent + "%";

        // === COLORI DEFINITI DA GIUSEPPE ===
        const numero = parseInt(m.id.replace("Palo", "").trim());

        if (numero >= 205 && numero <= 224) {
          el.style.background = "#00aaff";   // Azzurro
        }
        else if (numero >= 225 && numero <= 244) {
          el.style.background = "#00cc44";   // Verde
        }
        else if (numero >= 245 && numero <= 293) {
          el.style.background = "#ff3333";   // Rosso
        }
        else {
          el.style.background = "#cccccc";   // Neutro
        }

        // Tooltip
        el.addEventListener("mouseenter", () => {
          tooltip.textContent = m.id;
          tooltip.style.left = leftPercent + "%";
          tooltip.style.top = topPercent + "%";
          tooltip.style.display = "block";
        });

        el.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
        });

        // Apertura PDF
        el.addEventListener("click", () => {
          if (m.pdf) window.open(m.pdf, "_blank");
        });

        map.appendChild(el);
      });
    });
